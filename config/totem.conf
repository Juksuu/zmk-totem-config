#CONFIG_ZMK_USB_LOGGING=n
CONFIG_ZMK_KEYBOARD_NAME="KBHTotem"

#adding zmk sleep not compatible with hardware looking for a new option
CONFIG_ZMK_SLEEP=y
#setting sleep time 15mins
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_POINTING=y
# comment out below to reduce battery use.  This is increased for users with bad bluetooth
#CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
#CONFIG_ZMK_STUDIO=y

#prospector dongle settings
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=80
CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y
CONFIG_PROSPECTOR_LAYER_NAME_UPPERCASE=y
